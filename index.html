<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Simples</title>
    <style>
        /*Definição do estilo da página*/
        body{
            font-family: Arial, Helvetica, sans-serif;/*Definir a fonte do texto*/
            text-align: center;/*Centralizar o texto da página*/
            margin: 50px; /*Definir uma margem ao redor do conteúdo*/
            background-color: #f4f4f4; /*Definir a cor de fundo padrão*/

        }
        /*Estilizar o botão*/
        button{
            padding: 10px 20px;/*Definir o tamanho do botão*/
            font-size: 16px;/*Define o tamanho da Fonte*/
            border: none; /* Remover borda do botão */
            border-radius: 5px; /* Arredondar as bordas */
            background-color: #4CAF50; /* Cor de fundo do botão */
            color: blue; /* Cor da fonte */
            cursor: pointer; /* Muda o cursor para indicar que é clicável */
            transition: background-color 0.3s ease; /* Adiciona um efeito suave ao passar o mouse */
        }

        button:hover {
            background-color: #45a049; /* Muda a cor de fundo ao passar o mouse */
        }

    </style>
</head>
<body>
    <!--Titulo principal da página-->
    <h1>Bem-vindos ao meu Site Simples</h1>

    <!--Botão que mudará a cor de fundo da nossa página-->
    <button onclick="mudarCor()">Mudar Cor de Fundo</button>
</body>
</html>
